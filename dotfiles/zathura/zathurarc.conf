set synctex true
set synctex-editor-command "texlab inverse-search -i %{input} -l %{line}"
set recolor-keephue true
set database sqlite

set adjust-open width

set selection-clipboard clipboard
set selection-notification false

set statusbar-h-padding 0
set statusbar-v-padding 0
set page-h-padding 1
set page-v-padding 1

map <C-b> toggle_statusbar

set single-page-mode false

set open-first-page false
set continuous-hist-save true

set window-title-basename true
set window-title-page true
set statusbar-basename true
set statusbar-page-percent true

set page-cache-size 30
