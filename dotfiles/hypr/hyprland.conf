monitor=,preferred,auto,auto

$bin = /home/zach/.local/bin
$terminal = alacritty
$browser = zen-beta
$empty = $bin/hypr-spacer

exec-once = dbus-update-activation-environment --systemd --all
exec-once = [workspace 1 silent] $terminal
exec-once = [workspace 1 silent] $browser
exec-once = awww-daemon
exec-once = waybar

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

animations {
    enabled = false
}

cursor {
    enable_hyprcursor = false
}

general {
    layout = dwindle
    gaps_in = 5
    gaps_out = 10

    border_size = 0
}

decoration {
    rounding = 3
    blur {
            enabled = false
    }
}

input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = yes
    }
}

$mainMod = SUPER

bind = $mainMod, T, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, F, fullscreen,
bind = $mainMod, B, exec, $browser

# Spawn an invisible client to reserve layout space in dwindle
# Spawn an invisible client to reserve layout space in dwindle
bind = $mainMod, E, exec, $empty
bind = $mainMod SHIFT, E, exec, pkill -f hypr-spacer

windowrule {
    name = hide-hypr-spacer
    match:class = ^(dev\.zach\.hypr_spacer|hyspcr)$

    opacity = 0.0 override
    border_size = 0
    no_shadow = true
    no_anim = true
}

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down,  movefocus, d

bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, down, movewindow, d
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, right, movewindow, r

# Resize active window with keyboard
bindel = $mainMod CTRL, left,  resizeactive, -40 0
bindel = $mainMod CTRL, right, resizeactive,  40 0
bindel = $mainMod CTRL, up,    resizeactive,  0 -40
bindel = $mainMod CTRL, down,  resizeactive,  0  40

# Fine-grained resize
bindel = $mainMod CTRL SHIFT, left,  resizeactive, -10 0
bindel = $mainMod CTRL SHIFT, right, resizeactive,  10 0
bindel = $mainMod CTRL SHIFT, up,    resizeactive,  0 -10
bindel = $mainMod CTRL SHIFT, down,  resizeactive,  0  10

# Resize to 16:9 canvas on ultrawide monitor
bind = $mainMod SHIFT, F2, resizeactive, exact 2560 1440

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = $mainMod, Tab, workspace, previous

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod CTRL SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod CTRL SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod CTRL SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod CTRL SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod CTRL SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod CTRL SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod CTRL SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod CTRL SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod CTRL SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod CTRL SHIFT, 0, movetoworkspacesilent, 10

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# handle audio
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = SHIFT, XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 1%+
bindel = SHIFT, XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 1%-
bind = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86AudioMicMute,     exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# handle media playing
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

# handle brightness
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bindel = SHIFT, XF86MonBrightnessUp, exec, brightnessctl set 1%+
bindel = SHIFT, XF86MonBrightnessDown, exec, brightnessctl set 1%-

bind = $mainMod, W, exec, $bin/vartoggle-waybar
bind = $mainMod SHIFT, W, exec, pkill -SIGUSR2 waybar

bind = $mainMod, D, exec, $bin/toggle-theme
bind = $mainMod, I, exec, $bin/toggle-eink
